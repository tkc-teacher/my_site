<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Мій медіа-світ</title>
    <style>
        body {
            background-color: #f4f7f6;
            font-family: Calibri, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        .media-block {
            background: white;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 15px;
    
            border-left: 6px solid #ff4757; /* Яскравий акцент */
        }

        h2 {
            color: #2f3542;
            margin-top: 0;
        }

        img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .map-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        /* Стилізація аудіо */
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <a href="index.html">Головна</a>
    <header>
        <h1>🎥 Мій медіа-світ</h1>
        <p>Колекція того, що я люблю дивитися та слухати</p>
    </header>

    <div class="container">

        <div class="media-block">
            <h2>📸 Моє улюблене місце</h2>
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Гірський пейзаж" class="main-img">
        </div>

        <div class="media-block">
            <h2>🗺️ Школа, де я навчаюся</h2>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m12!1m8!1m3!1d680.3613887555553!2d30.37542764319284!3d50.42215355537381!3m2!1i1024!2i768!4f13.1!2m1!1z0YjQutC-0LvQsCAxMzE!5e1!3m2!1suk!2sua!4v1775595025126!5m2!1suk!2sua" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>

        <div class="media-block">
            <h2>🎵 Мій плейлист</h2>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Ваш браузер не підтримує аудіо-елементи.
            </audio>
        </div>
    </div>
</body>
</html>
